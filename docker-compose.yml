version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wise-accounts-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wise_accounts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wise-accounts-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wise-accounts-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wise_accounts?schema=public
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRY: 15m
      CORS_ORIGIN: "*"
      AWS_REGION: ap-south-1
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
      UPI_ID: payment@upi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

volumes:
  postgres_data:
