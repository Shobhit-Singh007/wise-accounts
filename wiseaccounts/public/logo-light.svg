<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 0 690 200" width="690" height="200" role="img" aria-label="wise-accounts logo (light background)">
  <defs>
    <linearGradient id="goldL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7D982"/>
      <stop offset="55%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8E6608"/>
    </linearGradient>
    <linearGradient id="goldSoftL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBC15A"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="navyDeepL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123166"/>
      <stop offset="100%" stop-color="#0B2447"/>
    </linearGradient>
    <linearGradient id="navyMidL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E5AAA"/>
      <stop offset="100%" stop-color="#1B3D7A"/>
    </linearGradient>
  </defs>

  <!-- ICON: no dark badge — sits directly on light background -->
  <g transform="translate(30,20)">
    <!-- Faint ledger grid (very subtle) -->
    <g stroke="#0B2447" stroke-opacity="0.06" stroke-width="1">
      <line x1="20" y1="60"  x2="160" y2="60"/>
      <line x1="20" y1="90"  x2="160" y2="90"/>
      <line x1="20" y1="120" x2="160" y2="120"/>
      <line x1="20" y1="150" x2="160" y2="150"/>
    </g>

    <!-- Monogram W as four chevron strokes -->
    <path d="M 30 46 L 60 132 L 74 132 L 44 46 Z" fill="url(#navyMidL)" opacity="0.95"/>
    <path d="M 54 46 L 84 132 L 98 132 L 68 46 Z" fill="url(#goldL)"/>
    <path d="M 82 132 L 112 46 L 126 46 L 96 132 Z" fill="url(#navyMidL)" opacity="0.95"/>
    <path d="M 106 132 L 136 46 L 150 46 L 120 132 Z" fill="url(#goldL)"/>

    <!-- Baseline -->
    <rect x="30" y="138" width="120" height="4" rx="2" fill="url(#goldL)" opacity="0.95"/>
    <circle cx="40" cy="152" r="2.2" fill="url(#navyDeepL)" opacity="0.55"/>
    <circle cx="52" cy="152" r="2.2" fill="url(#navyDeepL)" opacity="0.4"/>
    <circle cx="64" cy="152" r="2.2" fill="url(#navyDeepL)" opacity="0.25"/>

    <!-- Verification coin -->
    <g transform="translate(138,44)">
      <circle r="16" fill="url(#goldSoftL)" stroke="#7A5407" stroke-opacity="0.35" stroke-width="1.2"/>
      <circle r="12" fill="none" stroke="#7A5407" stroke-opacity="0.35" stroke-width="1"/>
      <path d="M -6 0 L -1 6 L 7 -5" fill="none" stroke="#0B2447" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(238,0)">
    <text x="0" y="112"
          font-family="'Bodoni Moda','Playfair Display', Georgia, serif"
          font-size="62" font-weight="700" fill="#0B2447" letter-spacing="-0.5">
      wise<tspan fill="url(#goldL)" font-weight="700">·</tspan><tspan font-weight="300" font-style="italic">accounts</tspan>
    </text>
    <line x1="2" y1="132" x2="110" y2="132" stroke="url(#goldL)" stroke-width="3" stroke-linecap="round"/>
    <line x1="118" y1="132" x2="440" y2="132" stroke="#0B2447" stroke-width="1" stroke-opacity="0.28"/>
    <text x="2" y="158"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="12.5" font-weight="600" fill="#0B2447" letter-spacing="5.5" opacity="0.85">
      INVOICES  ·  INVENTORY  ·  STAFF
    </text>
  </g>
</svg>
